services:
  qiita-trend-front:
    container_name: qiita-trend-front
    build:
      context: .
      dockerfile: ./apps/qiita-trend-front/Dockerfile
      ssh:
        - default
    profiles:
      - frontend
    restart: always
    ports:
      - "3000:3000"
  qiita-trend-backend:
    container_name: qiita-trend-backend
    build:
      context: .
      dockerfile: ./apps/qiita-trend-backend/Dockerfile
      ssh:
        - default
    profiles:
      - backend
    restart: always
    ports:
      - "3200:3200"
  db:
    container_name: db
    image: postgres:18@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    image: redis:8.8@sha256:aa049e689e141a4358ad1d4562dc49c88a89fbab711fd8fcc33f684c80b26301
    container_name: redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
      --requirepass password
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: always
volumes:
  postgres_data:
  redis-data: