services:
  qiita-trend-front:
    container_name: qiita-trend-front
    build:
      context: .
      dockerfile: ./apps/qiita-trend-front/Dockerfile
    profiles:
      - frontend
    restart: always
    ports:
      - "3000:3000"
  qiita-trend-backend:
    container_name: qiita-trend-backend
    build:
      context: .
      dockerfile: ./apps/qiita-trend-backend/Dockerfile
    profiles:
      - backend
    restart: always
    ports:
      - "3200:3200"
  db:
    container_name: db
    image: postgres:18@sha256:f7ce845ee6873dd84be93c9828fe0d1fab0f9707dc9ac569694657398b290bce
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    image: redis:8.6@sha256:0c341492924cad6f5483f9133e43bd6c51ecdecbcadfac5b51657393b6a7936c
    container_name: redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
      --requirepass password
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: always
volumes:
  postgres_data:
  redis-data: